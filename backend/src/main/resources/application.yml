spring:
  application:
    name: recipe-ai-backend
  
  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    deserialization:
      fail-on-unknown-properties: false
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/recipe_ai?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update  # 开发环境用update，生产环境用validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# JWT配置
jwt:
  secret: your_jwt_secret_key_min_256_bits_please_change_in_production
  expiration: 86400000  # 24小时(毫秒)

# AI接口配置
ai:
  tongyi:
    # 通义千问API配置
    api-key: ${TONGYI_API_KEY:your_api_key_here}
    base-url: https://dashscope.aliyuncs.com/api/v1
    model:
      text: qwen-turbo  # 文本生成模型
      vision: qwen-vl-plus  # 视觉识别模型
      voice: cosyvoice-v1  # 语音合成模型
    timeout: 60000  # 超时时间(毫秒)
    max-tokens: 2000

# 日志配置
logging:
  level:
    com.recipe: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/recipe-ai.log

# 应用配置
app:
  # 食材过期提醒配置
  ingredient:
    expiry-alert:
      high-priority: 2  # 高优先级:1-2天
      medium-priority: 4  # 中优先级:3-4天
      low-priority: 7  # 低优先级:5-7天
  
  # 推荐算法配置
  recommend:
    expiry-days-threshold: 7  # 临期食材天数阈值
    max-recommendations: 20  # 最大推荐数量
    cache-ttl: 3600  # 推荐结果缓存时间(秒)
